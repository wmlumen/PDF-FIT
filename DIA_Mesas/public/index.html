    function formatDate(timestamp) {
      return new Date(timestamp).toLocaleString('es-PY', {
        day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
      });
    }

    function normalizeCedula(cedula) {
      return cedula.toString().replace(/\D/g, '');
    }

    function calculateStats() {
      const vals = Object.values(state.votos);
      const totalVotaron = vals.length;
      const equipoAsistio = vals.filter(v => v.tipo === 'equipo').length;
      const controversias = vals.filter(v => v.controversia).length;
      return { totalVotaron, equipoAsistio, controversias };
    }

    async function registrarConsulta(cedula, mesa, orden, nombre) {
      const payload = {
        cedula: cedula,
        mesa: mesa,
        orden: orden,
        nombre: nombre,
        timestamp: new Date().toLocaleString('es-PY'),
        origen: 'DDIA-Consulta',
        veedor: state.currentUserData.nombre,
        veedorCedula: state.currentUserData.cedula
      };

      try {
        // Intento 1: Enviar a Google Apps Script Web App
        if (DDIA_API_URL && !DDIA_API_URL.includes('XXXXXXXX')) {
          const response = await fetch(DDIA_API_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          if (response.ok) {
            console.log('Registro electoral enviado a Sheets:', payload);
            return { ok: true, source: 'api' };
          }
        }
        
        // Intento 2: Guardar en localStorage para sincronizacion posterior
        const localKey = 'ddia_registros_consulta';
        const existing = JSON.parse(localStorage.getItem(localKey) || '[]');
        existing.push(payload);
        localStorage.setItem(localKey, JSON.stringify(existing));
        console.log('Registro electoral guardado localmente:', payload);
        return { ok: true, source: 'local' };
      } catch (error) {
        console.error('Error al registrar consulta:', error);
        // Fallback: localStorage
        const localKey = 'ddia_registros_consulta';
        const existing = JSON.parse(localStorage.getItem(localKey) || '[]');
        existing.push(payload);
        localStorage.setItem(localKey, JSON.stringify(existing));
        return { ok: true, source: 'local', error: error.message };
      }
    }

    function consultarVotante(cedula) {
      state.searching = true;
      render();
      
      setTimeout(async () => {
        const cedulaNorm = normalizeCedula(cedula);
        const result = padronData.find(v => normalizeCedula(v.cedula).includes(cedulaNorm) || cedulaNorm.includes(normalizeCedula(v.cedula)));
        
        if (result) {
          state.consultaResult = { ...result, encontrado: true, registroStatus: 'registrando' };
          // Registrar en hoja de forma asincrona
          const registro = await registrarConsulta(result.cedula, result.mesa, result.orden, result.nombre);
          state.consultaResult.registroStatus = registro.source === 'api' ? 'registrado' : 'pendiente';
          state.consultaResult.registroSource = registro.source;
        } else {
          state.consultaResult = { encontrado: false, cedula: cedula };
        }
        
        state.searching = false;
        render();
      }, 500);
    }

          </div>
          <div class="bg-white rounded-[2rem] p-8 shadow-xl border border-slate-100 text-center hover:shadow-2xl transition-all">
            <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </div>
            <h3 class="text-lg font-black text-slate-900 mb-2">Centro de Ayuda</h3>
            <p class="text-slate-500 text-sm">0810-123-456</p>
          </div>
        </div>
      `;
    }

    function renderGrid() {
      const stats = calculateStats();
      return `
        <div class="animate-in fade-in">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-100">
              <p class="text-xs uppercase font-black text-slate-400 mb-2 tracking-widest">Participación</p>
              <div class="flex items-baseline gap-3">
                <span class="text-4xl font-black text-slate-900">${((stats.totalVotaron / TOTAL_NUMBERS) * 100).toFixed(1)}%</span>
                <span class="text-sm font-bold text-slate-400 uppercase">Mesa</span>
              </div>
            </div>
            <div class="bg-indigo-600 p-6 rounded-[2rem] shadow-xl text-white">
              <p class="text-xs uppercase font-black text-indigo-200 mb-2 tracking-widest">Equipo Local</p>
              <div class="flex items-baseline gap-3">
                <span class="text-4xl font-black">${((stats.equipoAsistio / IDS_EQUIPO_INICIAL.length) * 100).toFixed(1)}%</span>
                <span class="text-sm font-bold text-indigo-200 uppercase">Presentes</span>
              </div>
            </div>
            <div class="p-6 rounded-[2rem] shadow-xl border transition-all ${stats.controversias > 0 ? 'bg-rose-600 border-rose-500 text-white' : 'bg-white border-slate-100 text-slate-300'}">
              <p class="text-xs uppercase font-black mb-2 tracking-widest">Controversias</p>
              <div class="flex items-center gap-4">
                <span class="text-4xl font-black">${stats.controversias}</span>
                ${stats.controversias > 0 ? '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>' : ''}
              </div>
            </div>
          </div>

          <div class="bg-white p-8 rounded-[3rem] shadow-2xl border border-slate-100">
            <div class="grid grid-cols-5 sm:grid-cols-10 md:grid-cols-20 gap-2">
              ${Array.from({ length: TOTAL_NUMBERS }, (_, i) => i + 1).map(num => {
                const voto = state.votos[num];
                const esEquipo = IDS_EQUIPO_INICIAL.includes(num);
                
                let btnStyle = "bg-white text-slate-400 border border-slate-200 hover:border-indigo-300 hover:text-indigo-600";
                
                if (voto?.controversia) {
                  btnStyle = "bg-rose-600 text-white font-black border-rose-700 ring-4 ring-rose-200";
                } else if (voto?.tipo === 'equipo') {
                  btnStyle = "bg-indigo-600 text-white font-black border-indigo-700";
                } else if (voto?.tipo === 'voto') {
                  btnStyle = "bg-emerald-500 text-white font-bold border-emerald-600";
                } else if (esEquipo) {
                  btnStyle = "bg-slate-50 text-indigo-400 border-2 border-indigo-200 italic font-bold";
                }

                return `
                  <button onclick="openElector(${num}, ${esEquipo})" class="aspect-square border rounded-xl transition-all duration-300 hover:scale-105 text-xs font-bold ${btnStyle}">
                    ${num}
                  </button>
                `;
              }).join('')}
            </div>
            <div class="mt-8 flex flex-wrap gap-4 justify-center">
              <div class="flex items-center gap-2">
                <div class="w-6 h-6 bg-white border border-slate-200 rounded"></div>
                <span class="text-xs text-slate-500">Sin marcar</span>
              </div>
              <div class="flex items-center gap-2">
                <div class="w-6 h-6 bg-emerald-500 rounded"></div>
                <span class="text-xs text-slate-500">Votó</span>
              </div>
              <div class="flex items-center gap-2">
                <div class="w-6 h-6 bg-indigo-600 rounded"></div>
                <span class="text-xs text-slate-500">Equipo</span>
              </div>
              <div class="flex items-center gap-2">
                <div class="w-6 h-6 bg-rose-600 rounded"></div>
                <span class="text-xs text-slate-500">Controversia</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderHistory() {
      return `
        <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden animate-in">
          <div class="p-8 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
            <h2 class="font-black uppercase text-xl tracking-tight">Auditoría de Posta</h2>
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest bg-white px-4 py-2 rounded-full border">Tiempo Real</span>
          </div>
          <div class="divide-y divide-slate-100">
            ${state.transferLog.length === 0 ? `
              <div class="p-24 text-center text-slate-300 italic font-bold text-lg">Sin transferencias aún...</div>
            ` : state.transferLog.map((log, i) => `
              <div class="p-6 flex items-center justify-between hover:bg-slate-50 transition-colors">
                <div class="flex items-center gap-6">
                  <div class="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center border border-emerald-100">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>
                  </div>
                  <div>
                    <p class="font-black text-slate-900 uppercase tracking-tight text-lg leading-none mb-2">${log.accion}</p>
                    <p class="text-sm font-bold text-indigo-600">${log.de}</p>
                  </div>
                </div>
                <div class="text-right">
                  <p class="text-xs font-black text-slate-500 bg-slate-100 px-4 py-2 rounded-lg">${formatDate(log.timestamp)}</p>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderQRModal() {
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent('https://electoral-control.app/transfer?mesa=042&from=veedor-001')}`;
      return `
        <div class="fixed inset-0 bg-slate-900/90 backdrop-blur-2xl z-[100] flex items-center justify-center p-6">
          <div class="bg-white rounded-[3rem] p-12 max-w-md w-full text-center shadow-2xl animate-in zoom-in">
            <h2 class="text-3xl font-black text-slate-900 mb-3 uppercase tracking-tighter italic">Pasar Posta</h2>
            <div class="bg-slate-50 p-10 rounded-[3rem] inline-block mb-10 border-2 border-dashed border-slate-300">
              <img src="${qrUrl}" alt="QR" class="w-56 h-56 mx-auto">
            </div>
            <button onclick="state.showQR=false;render()" class="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white font-black rounded-2xl uppercase text-sm tracking-widest shadow-xl">
              Cerrar
            </button>
          </div>
        </div>
      `;
    }

    function openElector(id, esEquipo) {
      state.selectedElector = { id, esEquipo };
      render();
    }

    function renderElectorModal() {
      const { id, esEquipo } = state.selectedElector;
      const voto = state.votos[id];
      
      return `
        <div class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-6">
          <div class="bg-white rounded-[3rem] w-full max-w-md overflow-hidden shadow-2xl animate-in fade-in">
            <div class="p-10 text-white flex justify-between items-center ${esEquipo ? 'bg-indigo-600' : 'bg-emerald-600'}">
              <div class="flex items-center gap-6">
                <span class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center font-black text-3xl shadow-inner border border-white/30">
                  ${id}
                </span>
                <div>
                  <h3 class="font-black uppercase tracking-tighter text-2xl leading-none">Confirmar</h3>
                  <p class="text-xs font-bold opacity-80 mt-2 uppercase tracking-widest">${esEquipo ? 'Nómina de Equipo' : 'Nómina General'}</p>
                </div>
              </div>
              <button onclick="state.selectedElector=null;render()" class="p-2 hover:bg-white/10 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            </div>
            
            <div class="p-10 space-y-6">
              ${voto?.controversia ? `
                <div class="bg-rose-50 border-2 border-rose-100 p-6 rounded-[2rem] flex gap-4 text-rose-700">
                  <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="shrink-0"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
                  <p class="text-xs font-bold leading-tight">Otro veedor registró una opción distinta. Verifique el dato físico.</p>
                </div>
              ` : ''}

              <div class="flex flex-col gap-4">
                ${esEquipo ? `
                  <button onclick="handleMarcar(${id}, 'equipo')" class="w-full flex items-center justify-between p-8 bg-indigo-50 hover:bg-indigo-100 border-2 border-indigo-200 rounded-[2rem] transition-all group shadow-sm">
                    <div class="flex items-center gap-4">
                      <div class="p-4 bg-white rounded-2xl shadow-sm text-indigo-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                      </div>
                      <span class="text-sm font-black uppercase tracking-widest text-indigo-800">Presente Equipo</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
                  </button>
                ` : `
                  <button onclick="handleMarcar(${id}, 'voto')" class="w-full flex items-center justify-between p-8 bg-emerald-50 hover:bg-emerald-100 border-2 border-emerald-200 rounded-[2rem] transition-all group shadow-sm">
                    <div class="flex items-center gap-4">
                      <div class="p-4 bg-white rounded-2xl shadow-sm text-emerald-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
                      </div>
                      <span class="text-sm font-black uppercase tracking-widest text-emerald-800">Marcar Voto</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></svg>
                  </button>
                `}
              </div>

              <div class="pt-6 border-t border-slate-100 flex justify-between items-center text-xs font-black tracking-widest text-slate-300">
                <span class="italic uppercase">Mesa 042</span>
                <span class="uppercase text-indigo-400">Verificación Biométrica</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    render();
  </script>
</body>
</html>
