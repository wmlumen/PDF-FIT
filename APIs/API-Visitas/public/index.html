<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API-Visitas · Dashboard</title>
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
    
    .header {
      background: linear-gradient(135deg, #1e293b, #334155);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #475569;
    }
    .header h1 { font-size: 1.5rem; font-weight: 600; }
    .header h1 span { color: #38bdf8; }
    .header-controls { display: flex; gap: 1rem; align-items: center; }
    .header-controls select {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid #475569;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .header-controls select:focus { outline: none; border-color: #38bdf8; }
    .badge {
      background: #38bdf8;
      color: #0f172a;
      padding: 0.25rem 0.75rem;
      border-radius: 1rem;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.25rem;
      text-align: center;
      transition: transform 0.2s;
    }
    .stat-card:hover { transform: translateY(-2px); border-color: #38bdf8; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #38bdf8; }
    .stat-card .label { font-size: 0.85rem; color: #94a3b8; margin-top: 0.25rem; }

    .main-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }
    @media (max-width: 768px) {
      .header { flex-direction: column; gap: 0.75rem; padding: 1rem; text-align: center; }
      .header h1 { font-size: 1.2rem; }
      .header-controls { width: 100%; justify-content: center; }
      .header-controls select { flex: 1; max-width: 200px; font-size: 0.85rem; }
      .container { padding: 0.75rem; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; }
      .stat-card { padding: 0.75rem; }
      .stat-card .value { font-size: 1.4rem; }
      .stat-card .label { font-size: 0.7rem; }
      #map { height: 250px; }
      .card-header { font-size: 0.85rem; padding: 0.6rem 0.75rem; }
      .card-body { padding: 0.5rem; }
      table { font-size: 0.7rem; }
      th, td { padding: 0.3rem 0.4rem; }
      .bottom-grid { gap: 0.75rem; }
      .footer { font-size: 0.7rem; padding: 1rem; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 0.4rem; }
      .stat-card { padding: 0.5rem; }
      .stat-card .value { font-size: 1.1rem; }
      .stat-card .label { font-size: 0.65rem; }
      #map { height: 200px; }
      .header h1 { font-size: 1rem; }
      table { font-size: 0.65rem; font-size: 0.65rem; }
      th, td { padding: 0.25rem 0.3rem; }
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      overflow: hidden;
    }
    .card-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #334155;
      font-weight: 600;
      font-size: 1rem;
    }
    .card-body { padding: 1rem; }

    #map { height: 400px; width: 100%; border-radius: 0.5rem; }

    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    @media (max-width: 768px) { .bottom-grid { grid-template-columns: 1fr; } }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th {
      text-align: left;
      padding: 0.5rem 0.75rem;
      color: #94a3b8;
      font-weight: 500;
      border-bottom: 1px solid #334155;
    }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #1e293b; }
    tr:hover td { background: #0f172a; }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #94a3b8;
    }
    .loading::after {
      content: '';
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border: 2px solid #38bdf8;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center;
      padding: 1.5rem;
      color: #475569;
      font-size: 0.8rem;
    }
    .footer a { color: #38bdf8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🌐 <span>API-Visitas</span> Dashboard</h1>
    <div class="header-controls">
      <select id="projectSelect" onchange="changeProject()">
        <option value="">Cargando proyectos...</option>
      </select>
      <span class="badge" id="statusBadge">En vivo</span>
    </div>
  </div>

  <div class="container">
    <!-- Stats Cards -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="value" id="totalVisits">—</div><div class="label">Visitas totales</div></div>
      <div class="stat-card"><div class="value" id="uniqueVisitors">—</div><div class="label">Visitantes únicos</div></div>
      <div class="stat-card"><div class="value" id="todayVisits">—</div><div class="label">Visitas hoy</div></div>
      <div class="stat-card"><div class="value" id="uniqueToday">—</div><div class="label">Únicos hoy</div></div>
      <div class="stat-card"><div class="value" id="weekVisits">—</div><div class="label">Esta semana</div></div>
    </div>

    <!-- Map + Top Pages -->
    <div class="main-grid">
      <div class="card">
        <div class="card-header">📍 Mapa de visitas</div>
        <div class="card-body"><div id="map" class="loading">Cargando mapa...</div></div>
      </div>
      <div class="card">
        <div class="card-header">📄 Top páginas</div>
        <div class="card-body" id="topPages"><div class="loading">Cargando...</div></div>
      </div>
    </div>

    <!-- Bottom Charts -->
    <div class="bottom-grid">
      <div class="card">
        <div class="card-header">📈 Visitas por día (30 días)</div>
        <div class="card-body"><canvas id="timelineChart" height="200"></canvas></div>
      </div>
      <div class="card">
        <div class="card-header">💻 Navegadores</div>
        <div class="card-body"><canvas id="browserChart" height="200"></canvas></div>
      </div>
    </div>

    <!-- Recent visits table -->
    <div class="card" style="margin-top: 1.5rem;">
      <div class="card-header">🕐 Últimas visitas</div>
      <div class="card-body" id="recentVisits"><div class="loading">Cargando...</div></div>
    </div>
  </div>

  <div class="footer">
    <a href="https://github.com/wmlumen/api-visitas" target="_blank">API-Visitas</a> · 
    <span id="footerTime">—</span>
  </div>

  <script src="map.js"></script>
  <script src="stats.js"></script>
</body>
</html>
